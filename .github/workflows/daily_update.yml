name: Daily GeoPuls Update

on:
  schedule:
    # Täglich um 04:00 Uhr UTC ausführen
    - cron: '0 4 * * *'
  workflow_dispatch: # Erlaubt manuelles Auslösen über den Button in GitHub Actions

jobs:
  update-dashboard:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Wichtig: Erlaubt GitHub Actions das Pushen von data.json und history.json

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Python 3.11 einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Abhängigkeiten installieren
        run: |
          python -m pip install --upgrade pip
          pip install groq feedparser requests yfinance

      - name: GeoPuls Skript ausführen
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python update_dashboard.py

      - name: Aktualisierte Daten committen und pushen
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json history.json || true
          git diff --staged --quiet || (git commit -m "Automatisches GeoPuls Update [skip ci]" && git push)

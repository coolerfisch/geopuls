name: Argus Grid Multi-LLM Update

on:
  schedule:
    # Laufen alle 48 Stunden um 04:00 Uhr UTC
    - cron: '0 4 */2 * *'
  workflow_dispatch: # Erlaubt das manuelle Auslösen per Button in GitHub

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Python 3.11 einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Benötigte Python-Bibliotheken installieren
        run: |
          python -m pip install --upgrade pip
          pip install anthropic feedparser requests yfinance groq openai

      - name: Multi-LLM Dashboard Skript ausführen
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          python update_dashboard.py

      - name: Geänderte data.json zurück ins Repository committen
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-Update Argus Grid Data [skip ci]" && git push)
